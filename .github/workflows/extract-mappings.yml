name: extract-mappings
on:
  workflow_dispatch: {}

jobs:
  extract:
    runs-on: ubuntu-24.04
    steps:
      - name: checkout repository
        uses: actions/checkout@v6
      - name: setup jdk
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'microsoft'
      - name: make gradle wrapper executable
        run: chmod +x ./gradlew
      - name: gen mapped sources
        run: ./gradlew genSources --no-daemon
      - name: locate sources jars
        run: |
          find ~ -iname "*sources*.jar" 2>/dev/null | grep -iv "loader\|mixin\|fabric-api\|junit\|asm-" | tee /tmp/jar_paths.txt
      - name: extract relevant class signatures
        run: |
          mkdir -p /tmp/mcsrc
          cd /tmp/mcsrc
          while read -r JAR; do
            echo "Unzipping: $JAR"
            unzip -oq "$JAR" || true
          done < /tmp/jar_paths.txt

          OUT=/tmp/mcsrc_signatures.txt
          echo "=== ServerLevel / server tick ===" > "$OUT"
          find . -iname "ServerLevel.java" -exec grep -n "class ServerLevel\|void tick\|tickChunk\|public void tick" {} + >> "$OUT" 2>/dev/null

          echo "=== ClientLevel / particles ===" >> "$OUT"
          find . -iname "ClientLevel.java" -exec grep -n "class ClientLevel\|addParticle" {} + >> "$OUT" 2>/dev/null

          echo "=== LevelRenderer / chunk render ===" >> "$OUT"
          find . -iname "LevelRenderer.java" -exec grep -n "class LevelRenderer\|void renderLevel\|void setupRender\|renderChunkLayer" {} + >> "$OUT" 2>/dev/null

          echo "=== HopperBlockEntity ===" >> "$OUT"
          find . -iname "HopperBlockEntity.java" -exec grep -n "class HopperBlockEntity\|void tick\|tryMoveItems" {} + >> "$OUT" 2>/dev/null

          echo "=== FurnaceBlockEntity / AbstractFurnaceBlockEntity ===" >> "$OUT"
          find . -iname "*FurnaceBlockEntity.java" -exec grep -n "class .*Furnace\|void tick" {} + >> "$OUT" 2>/dev/null

          echo "=== CropBlock ===" >> "$OUT"
          find . -iname "CropBlock.java" -exec grep -n "class CropBlock\|randomTick" {} + >> "$OUT" 2>/dev/null

          echo "=== ObserverBlock ===" >> "$OUT"
          find . -iname "ObserverBlock.java" -exec grep -n "class ObserverBlock\|void.*[Uu]pdate\|neighborChanged" {} + >> "$OUT" 2>/dev/null

          echo "=== ComparatorBlock ===" >> "$OUT"
          find . -iname "ComparatorBlock.java" -exec grep -n "class ComparatorBlock\|calculateOutputSignal\|getOutputSignal" {} + >> "$OUT" 2>/dev/null

          echo "=== TickRateManager / ServerTickRateManager ===" >> "$OUT"
          find . -iname "*TickRateManager*.java" -exec grep -n "class \|public.*tickrate\|void.*[Rr]ate\|tickRateManager" {} + >> "$OUT" 2>/dev/null

          echo "=== LevelChunkTicks / scheduled ticks ===" >> "$OUT"
          find . -iname "LevelChunkTicks.java" -exec grep -n "class LevelChunkTicks\|void schedule\|void tick" {} + >> "$OUT" 2>/dev/null

          echo "=== Level blockEvent / getServer ===" >> "$OUT"
          find . -iname "Level.java" -exec grep -n "boolean blockEvent\|void blockEvent" {} + >> "$OUT" 2>/dev/null
          find . -iname "ServerLevel.java" -exec grep -n "getServer()\|MinecraftServer getServer" {} + >> "$OUT" 2>/dev/null

          echo "=== RedstoneWireBlock ===" >> "$OUT"
          find . -iname "RedstoneWireBlock.java" -exec grep -n "class RedstoneWireBlock\|void.*[Uu]pdate" {} + >> "$OUT" 2>/dev/null

          echo "=== ParticleEngine ===" >> "$OUT"
          find . -iname "ParticleEngine.java" -exec grep -n "class ParticleEngine\|void tick\|void render\|createParticle" {} + >> "$OUT" 2>/dev/null

          echo "=== LightEngine ===" >> "$OUT"
          find . -iname "*LightEngine*.java" -exec echo {} \; >> "$OUT" 2>/dev/null

          echo "=== entities/ : Mob, LivingEntity, Entity tick+AI ===" >> "$OUT"
          find . -iname "Mob.java" -exec grep -n "class Mob\|void aiStep\|void tick\|void serverAiStep\|void customServerAiStep" {} + >> "$OUT" 2>/dev/null
          find . -iname "LivingEntity.java" -exec grep -n "class LivingEntity\|void aiStep\|void tick" {} + >> "$OUT" 2>/dev/null
          find . -iname "Entity.java" -path "*world/entity/Entity.java" -exec grep -n "^public.*class Entity\|public void tick\b" {} + >> "$OUT" 2>/dev/null

          echo "=== culling/ : Frustum, chunk section visibility ===" >> "$OUT"
          find . -iname "Frustum.java" -exec grep -n "class Frustum\|public boolean" {} + >> "$OUT" 2>/dev/null
          find . -iname "*SectionRenderDispatcher*.java" -o -iname "*ChunkRenderDispatcher*.java" -o -iname "*RenderSectionManager*.java" >> "$OUT" 2>/dev/null

          echo "=== chunks/ : generation, storage, chunk map ===" >> "$OUT"
          find . -iname "ServerChunkCache.java" -exec grep -n "class ServerChunkCache\|public.*tick\|getChunk" {} + >> "$OUT" 2>/dev/null
          find . -iname "ChunkMap.java" -exec grep -n "class ChunkMap" {} + >> "$OUT" 2>/dev/null
          find . -iname "ChunkGenerator.java" -exec grep -n "^public.*class ChunkGenerator" {} + >> "$OUT" 2>/dev/null

          echo "=== memory/ : font/texture caches ===" >> "$OUT"
          find . -iname "FontManager.java" -exec grep -n "class FontManager" {} + >> "$OUT" 2>/dev/null
          find . -iname "TextureManager.java" -exec grep -n "class TextureManager\|void register\|void tick" {} + >> "$OUT" 2>/dev/null

          echo "=== resources/ : reload, model manager ===" >> "$OUT"
          find . -iname "*ReloadableResourceManager*.java" -exec grep -n "class .*ResourceManager" {} + >> "$OUT" 2>/dev/null
          find . -iname "ModelManager.java" -exec grep -n "class ModelManager\|void apply\|void reload" {} + >> "$OUT" 2>/dev/null

          echo "=== mesh/ : model baking, chunk section compiling ===" >> "$OUT"
          find . -iname "ModelBakery.java" -exec grep -n "class ModelBakery" {} + >> "$OUT" 2>/dev/null
          find . -iname "*SectionCompiler*.java" -o -iname "BlockRenderDispatcher.java" >> "$OUT" 2>/dev/null

          echo "=== File tree (sanity check - which jars actually had client classes) ===" >> "$OUT"
          find . -iname "ServerLevel.java" -o -iname "ClientLevel.java" -o -iname "LevelRenderer.java" -o -iname "HopperBlockEntity.java" -o -iname "Frustum.java" -o -iname "Mob.java" >> "$OUT" 2>/dev/null

          cat "$OUT"
      - name: upload signatures
        uses: actions/upload-artifact@v7
        with:
          name: mc-signatures
          path: /tmp/mcsrc_signatures.txt
